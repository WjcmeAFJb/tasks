appId: org.tasks
tags:
  - smoke
  - crud
---
# Creates a task and marks it complete by tapping its checkbox.

- launchApp:
    clearState: true
- tapOn: "Continue without sync"

# Create a task
- tapOn:
    id: "org.tasks:id/fab"
- tapOn: "Task name"
- inputText: "Task to complete"
- tapOn: "Save"
- assertVisible: "Task to complete"

- takeScreenshot: screenshots/04_complete_task_before

# Tap the checkbox (left of the task text)
# The checkbox is at the left edge of the task row
- tapOn:
    point: "8%,26%"

# After completing, the task moves to the "Completed" section
- waitForAnimationToEnd
- assertVisible: "Completed"

- takeScreenshot: screenshots/04_complete_task_after
